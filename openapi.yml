openapi: 3.0.3
info:
  title: Nimons360 API
  description: |
    API for Nimons360 - Family Location Sharing Application

    This API provides endpoints for:
    - User authentication (login/logout)
    - Profile management
    - Family management (create, join, leave)
    - Location sharing via WebSocket

  version: 1.0.0
  contact:
    name: Labpro 2026

servers:
  - url: https://mad.labpro.hmif.dev
    description: Production Server

paths:
  /api/login:
    post:
      summary: Login user
      description: |
        Authenticate user using email and password.
        Returns JWT token for subsequent API calls.
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: "13522001@std.stei.itb.ac.id"
              password: "13522001"
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials
        '500':
          description: Server error

  /api/me:
    get:
      summary: Get user profile
      description: Get the currently logged-in user's profile information
      tags:
        - Profile
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Profile retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'
        '401':
          description: Unauthorized - Token expired or invalid
        '409':
          description: Unauthorized - Token expired (requires re-login)

    patch:
      summary: Update user profile
      description: Update the currently logged-in user's name
      tags:
        - Profile
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
            example:
              fullName: "Dhafin Fawwaz Ikramullah"
      responses:
        '200':
          description: Profile updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'
        '401':
          description: Unauthorized
        '409':
          description: Token expired

  /api/families:
    get:
      summary: Get all families
      description: Get list of all available families
      tags:
        - Families
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Families retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FamiliesListResponse'
        '401':
          description: Unauthorized
        '409':
          description: Token expired

    post:
      summary: Create a new family
      description: Create a new family with name and icon
      tags:
        - Families
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFamilyRequest'
            example:
              name: "IF3210 Squad"
              iconUrl: "https://mad.labpro.hmif.dev/assets/family_icon_1.png"
      responses:
        '201':
          description: Family created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FamilyDetailResponse'
        '400':
          description: Invalid request (invalid icon URL)
        '401':
          description: Unauthorized
        '409':
          description: Token expired

  /api/me/families:
    get:
      summary: Get user's families
      description: Get list of families that the current user is a member of
      tags:
        - Families
      security:
        - BearerAuth: []
      responses:
        '200':
          description: User's families retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MyFamiliesListResponse'
        '401':
          description: Unauthorized
        '409':
          description: Token expired

  /api/families/discover:
    get:
      summary: Discover random families
      description: Get 5 random families that the user is not a member of
      tags:
        - Families
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Random families retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscoverFamiliesResponse'
        '401':
          description: Unauthorized
        '409':
          description: Token expired

  /api/families/{familyId}:
    get:
      summary: Get family detail
      description: Get detailed information about a specific family
      tags:
        - Families
      security:
        - BearerAuth: []
      parameters:
        - name: familyId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          example: 41
      responses:
        '200':
          description: Family details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FamilyDetailResponse'
        '401':
          description: Unauthorized
        '404':
          description: Family not found
        '409':
          description: Token expired

  /api/families/join:
    post:
      summary: Join a family
      description: Join an existing family using family ID and code
      tags:
        - Families
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JoinFamilyRequest'
            example:
              familyId: 41
              familyCode: "ABC123"
      responses:
        '200':
          description: Successfully joined family
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JoinFamilyResponse'
        '400':
          description: Invalid family code
        '401':
          description: Unauthorized
        '409':
          description: Token expired

  /api/families/leave:
    post:
      summary: Leave a family
      description: Leave a family that the user is currently a member of
      tags:
        - Families
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LeaveFamilyRequest'
            example:
              familyId: 41
      responses:
        '200':
          description: Successfully left family
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaveFamilyResponse'
        '400':
          description: Not a member of this family
        '401':
          description: Unauthorized
        '409':
          description: Token expired

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token received from login endpoint

  schemas:
    # Request Schemas
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          description: User email (NIM format: {NIM}@std.stei.itb.ac.id)
        password:
          type: string
          description: User password (typically NIM)

    UpdateProfileRequest:
      type: object
      required:
        - fullName
      properties:
        fullName:
          type: string
          maxLength: 100
          description: Updated full name

    CreateFamilyRequest:
      type: object
      required:
        - name
        - iconUrl
      properties:
        name:
          type: string
          maxLength: 50
          description: Family name
        iconUrl:
          type: string
          format: uri
          description: URL of family icon (must be from allowed icons)
          enum:
            - https://mad.labpro.hmif.dev/assets/family_icon_1.png
            - https://mad.labpro.hmif.dev/assets/family_icon_2.png
            - https://mad.labpro.hmif.dev/assets/family_icon_3.png
            - https://mad.labpro.hmif.dev/assets/family_icon_4.png
            - https://mad.labpro.hmif.dev/assets/family_icon_5.png
            - https://mad.labpro.hmif.dev/assets/family_icon_6.png
            - https://mad.labpro.hmif.dev/assets/family_icon_7.png
            - https://mad.labpro.hmif.dev/assets/family_icon_8.png

    JoinFamilyRequest:
      type: object
      required:
        - familyId
        - familyCode
      properties:
        familyId:
          type: integer
          format: int64
          description: ID of the family to join
        familyCode:
          type: string
          minLength: 6
          maxLength: 6
          description: 6-character family code

    LeaveFamilyRequest:
      type: object
      required:
        - familyId
      properties:
        familyId:
          type: integer
          format: int64
          description: ID of the family to leave

    # Response Schemas
    ApiResponse:
      type: object
      properties:
        data:
          type: object
          description: Response data
        error:
          type: string
          description: Error message (if any)

    LoginResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            token:
              type: string
              description: JWT authentication token
            expiresAt:
              type: string
              format: date-time
              description: Token expiration time
            user:
              $ref: '#/components/schemas/User'

    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
        nim:
          type: string
        email:
          type: string
          format: email
        fullName:
          type: string

    UserProfileResponse:
      type: object
      properties:
        data:
          allOf:
            - $ref: '#/components/schemas/User'
            - type: object
              properties:
                createdAt:
                  type: string
                  format: date-time
                updatedAt:
                  type: string
                  format: date-time

    Family:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        iconUrl:
          type: string
          format: uri

    FamiliesListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Family'

    Member:
      type: object
      properties:
        id:
          type: integer
          format: int64
        fullName:
          type: string
        email:
          type: string
          format: email
        joinedAt:
          type: string
          format: date-time

    MyFamily:
      allOf:
        - $ref: '#/components/schemas/Family'
        - type: object
          properties:
            familyCode:
              type: string
              description: 6-character family code (only visible to members)
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time
            members:
              type: array
              items:
                $ref: '#/components/schemas/Member'

    MyFamiliesListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/MyFamily'

    DiscoverFamily:
      allOf:
        - $ref: '#/components/schemas/Family'
        - type: object
          properties:
            createdAt:
              type: string
              format: date-time
            members:
              type: array
              description: Members with censored information
              items:
                type: object
                properties:
                  fullName:
                    type: string
                    description: Censored name (e.g., "D********* T*********")
                  email:
                    type: string
                    description: Censored email (e.g., "********@std.stei.itb.ac.id")

    DiscoverFamiliesResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/DiscoverFamily'

    FamilyDetail:
      allOf:
        - $ref: '#/components/schemas/Family'
        - type: object
          properties:
            isMember:
              type: boolean
              description: Whether current user is a member
            familyCode:
              type: string
              description: 6-character family code (only if isMember is true)
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time
            members:
              type: array
              description: Members with full/censored info based on membership

    FamilyDetailResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/FamilyDetail'

    JoinFamilyResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            joined:
              type: boolean

    LeaveFamilyResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            left:
              type: boolean
